  function parseMinecraftColors(text) {
    if (!text || text.trim() === '') return '&nbsp;';
    const colorMap = { '0': '#000000', '1': '#0000AA', '2': '#00AA00', '3': '#00AAAA', '4': '#AA0000', '5': '#AA00AA', '6': '#FFAA00', '7': '#AAAAAA', '8': '#555555', '9': '#5555FF', 'a': '#55FF55', 'b': '#55FFFF', 'c': '#FF5555', 'd': '#FF55FF', 'e': '#FFFF55', 'f': '#FFFFFF' };
    
    let html = '';
    let currentStyle = 'color: #AAAAAA;';
    let parts = text.split(/(?=&[0-9a-flr])/i);

    for (let part of parts) {
        if (part.startsWith('&') && part.length >= 2) {
            let code = part[1].toLowerCase();
            let textContent = part.substring(2);
            if (colorMap[code]) { currentStyle = `color: ${colorMap[code]};`; } 
            else if (code === 'l') { currentStyle += ` font-weight: bold;`; } 
            else if (code === 'r') { currentStyle = `color: #AAAAAA; font-weight: normal;`; }
            html += `<span style="${currentStyle}">${textContent}</span>`;
        } else {
            html += `<span style="${currentStyle}">${part}</span>`;
        }
    }
    return html;
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('display-title').innerText = menuConfig.title;
    const grid = document.getElementById('menu-grid');
    grid.style.setProperty('--cols', menuConfig.cols);
    grid.style.setProperty('--rows', menuConfig.rows);
    
    let html = '';
    const totalSlots = menuConfig.cols * menuConfig.rows;
    
    for (let i = 0; i < totalSlots; i++) {
      const item = menuConfig.data[i];
      if (!item) {
        html += `<div class="slot"></div>`;
      } else {
        html += MCEngine.makeSlotHtml(item, MCEngine.getApiFallback(item));
      }
    }
    grid.innerHTML = html;
  });

  document.addEventListener('tt-format', (e) => {
    const it = e.detail.item;
    let h = `<span class="tt-name" style="text-shadow: 2px 2px 0 rgba(0,0,0,0.8);">${parseMinecraftColors(it.rawName || '&f' + it.id)}</span>`;
    
    if (it.rawLore) {
        const lines = it.rawLore.split('\n');
        for (const l of lines) {
            h += `<span class="tt-line" style="text-shadow: 2px 2px 0 rgba(0,0,0,0.8); min-height: 16px;">${parseMinecraftColors(l)}</span>`;
        }
    }
    e.detail.html = h;
  });
</script>
</body>
</html>
