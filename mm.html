const layoutConfig = { "cols": 9, "rows": 8 };

function parseMinecraftColors(text) {
  if (!text || text.trim() === '') return '&nbsp;';
  
  const colorMap = { 
      '0': '#000000', '1': '#0000AA', '2': '#00AA00', '3': '#00AAAA', 
      '4': '#AA0000', '5': '#AA00AA', '6': '#FFAA00', '7': '#AAAAAA', 
      '8': '#555555', '9': '#5555FF', 'a': '#55FF55', 'b': '#55FFFF', 
      'c': '#FF5555', 'd': '#FF55FF', 'e': '#FFFF55', 'f': '#FFFFFF' 
  };
  
  let html = '';
  let state = { color: '#AAAAAA', bold: false, italic: false, underline: false, strikethrough: false };

  function buildStyleString(s) {
      let styles = `color: ${s.color};`;
      if (s.bold) styles += ' font-weight: bold;';
      if (s.italic) styles += ' font-style: italic;';
      let decoration = [];
      if (s.underline) decoration.push('underline');
      if (s.strikethrough) decoration.push('line-through');
      if (decoration.length > 0) styles += ` text-decoration: ${decoration.join(' ')};`;
      return styles;
  }

  let parts = text.split(/(?=&[0-9a-flmno-r])/i);

  for (let part of parts) {
      if (part.startsWith('&') && part.length >= 2) {
          let code = part[1].toLowerCase();
          let textContent = part.substring(2);

          if (colorMap[code]) { 
              state.color = colorMap[code]; 
              state.bold = false; state.italic = false; state.underline = false; state.strikethrough = false;
          } 
          else if (code === 'l') { state.bold = true; } 
          else if (code === 'm') { state.strikethrough = true; }
          else if (code === 'n') { state.underline = true; }
          else if (code === 'o') { state.italic = true; }
          else if (code === 'r') { 
              state.color = '#AAAAAA'; state.bold = false; state.italic = false; state.underline = false; state.strikethrough = false;
          }
          html += `<span style="${buildStyleString(state)}">${textContent}</span>`;
      } else {
          html += `<span style="${buildStyleString(state)}">${part}</span>`;
      }
  }
  return html;
}

function renderGrid(mode) {
  const grid = document.getElementById('menu-grid');
  grid.style.setProperty('--cols', layoutConfig.cols);
  grid.style.setProperty('--rows', layoutConfig.rows);
  
  let html = '';
  const totalSlots = layoutConfig.cols * layoutConfig.rows;
  const data = modesData[mode] || [];
  
  for (let i = 0; i < totalSlots; i++) {
    const item = data[i];
    if (!item) {
      html += `<div class="slot"></div>`;
    } else {
      // Intercept item generation to listen for internal slot clicks
      let slotHtml = MCEngine.makeSlotHtml(item, MCEngine.getApiFallback(item));
      if (item.isTabSwitch) {
        slotHtml = slotHtml.replace('<div class="item"', `<div class="item" onclick="window.location.hash='${item.isTabSwitch}'" style="cursor: pointer;"`);
      }
      html += slotHtml;
    }
  }
  grid.innerHTML = html;
}

function switchMode(mode) {
  if (!modesData[mode]) return;
  
  document.querySelectorAll('.gui-icon-tab').forEach(tab => tab.classList.remove('active'));
  const activeTab = document.getElementById(`tab-${mode}`);
  if (activeTab) activeTab.classList.add('active');
  
  renderGrid(mode);
}

document.addEventListener('DOMContentLoaded', () => {
  let currentMode = window.location.hash.replace('#', '').toLowerCase();
  if (!modesData[currentMode]) currentMode = 'classic';
  
  switchMode(currentMode);
});

window.addEventListener('hashchange', () => {
  let currentMode = window.location.hash.replace('#', '').toLowerCase();
  if (modesData[currentMode]) switchMode(currentMode);
});

document.addEventListener('tt-format', (e) => {
  const it = e.detail.item;
  let h = `<span class="tt-name" style="text-shadow: 2px 2px 0 rgba(0,0,0,0.8);">${parseMinecraftColors(it.rawName || '&f' + it.id)}</span>`;
  
  if (it.rawLore) {
      const lines = it.rawLore.split('\n');
      for (const l of lines) {
          h += `<span class="tt-line" style="text-shadow: 2px 2px 0 rgba(0,0,0,0.8); min-height: 16px;">${parseMinecraftColors(l)}</span>`;
      }
  }
  e.detail.html = h;
});
</script>
