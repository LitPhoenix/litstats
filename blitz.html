<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Kit Inventory</title>
<link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --mc-panel: #c6c6c6;
  --mc-font: 'Minecraft', sans-serif;
}

body {
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: var(--mc-font);
  color: #fff;
  image-rendering: pixelated;
}

/* --- Header & Nav --- */
#kit-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 15px;
}

.arrow-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 32px;
  cursor: pointer;
  font-family: var(--mc-font);
}

.arrow-btn:hover:not(:disabled) { color: #fff; }
.arrow-btn:disabled { opacity: 0.2; }

#kit-name {
  font-size: 1.5rem;
  text-shadow: 2px 2px 0 #000;
  min-width: 300px;
  text-align: center;
}

/* --- Main Inventory Box --- */
#inventory-container {
  background: var(--mc-panel);
  border: 4px solid #fff;
  border-right-color: #555;
  border-bottom-color: #555;
  padding: 12px;
  box-shadow: inset 2px 2px 0 #000;
  transition: transform 0.1s ease-out, opacity 0.1s ease-out;
}

/* Follows the layout of image_8c5706.png */
.top-section {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.armour-column {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

#player-box {
  width: 130px;
  height: 150px;
  background: #000;
  border: 2px solid #373737;
  border-right-color: #fff;
  border-bottom-color: #fff;
  position: relative;
  overflow: hidden;
}

#player-canvas {
  width: 100% !important;
  height: 100% !important;
}

/* Slots */
.inv-grid {
  display: grid;
  grid-template-columns: repeat(9, 36px);
  gap: 2px;
}

.slot {
  width: 36px;
  height: 36px;
  background: #8b8b8b;
  border: 2px solid #373737;
  border-right-color: #fff;
  border-bottom-color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.slot:hover {
  background: #bebebe;
  outline: 2px solid #fff;
  z-index: 10;
}

.slot img {
  width: 32px;
  height: 32px;
  image-rendering: pixelated;
}

.count {
  position: absolute;
  bottom: 1px;
  right: 2px;
  font-size: 14px;
  color: #fff;
  text-shadow: 1px 1px 0 #3f3f3f;
  pointer-events: none;
}

.hotbar-spacer { height: 8px; }

</style>
</head>
<body>

<div id="kit-header">
  <button class="arrow-btn" id="prevBtn">◀</button>
  <div id="kit-name">Loading...</div>
  <button class="arrow-btn" id="nextBtn">▶</button>
</div>

<div id="inventory-container">
  <div class="top-section">
    <div class="armour-column" id="armour-slots">
      <div class="slot" data-type="helmet"></div>
      <div class="slot" data-type="chestplate"></div>
      <div class="slot" data-type="leggings"></div>
      <div class="slot" data-type="boots"></div>
    </div>

    <div id="player-box">
      <canvas id="player-canvas"></canvas>
    </div>
  </div>

  <div id="bottom-section">
    <div class="inv-grid" id="main-inv"></div>
    <div class="hotbar-spacer"></div>
    <div class="inv-grid" id="hotbar-inv"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skinview3d@2.2.0/bundles/skinview3d.min.js"></script>

<script>
// Use 7-Zip/Crafatar - more reliable for CORS than mc-heads
const ITEM_URL = "https://crafatar.com/items/";

const KITS = [
  {
    name: "Kit I — Starter",
    armour: ["leather_helmet", "leather_chestplate", "leather_leggings", "leather_boots"],
    hotbar: [{id: "wooden_sword", n: 1}, {id: "bread", n: 16}],
    inv: [{id: "cobblestone", n: 64}]
  },
  // Added placeholder kits to reach 11 slides
  ...Array(9).fill({
    name: "Upgrading Kit...",
    armour: ["iron_helmet", "iron_chestplate", "iron_leggings", "iron_boots"],
    hotbar: [{id: "iron_sword", n: 1}],
    inv: []
  }),
  {
    name: "Kit XI — Prestige II ✦",
    armour: ["netherite_helmet", "netherite_chestplate", "netherite_leggings", "netherite_boots"],
    hotbar: [{id: "netherite_sword", n: 1}, {id: "enchanted_golden_apple", n: 64}],
    inv: [{id: "nether_star", n: 9}, {id: "beacon", n: 1}]
  }
];

let currentKit = 0;
let viewer;

function initPlayer() {
  viewer = new skinview3d.SkinViewer({
    canvas: document.getElementById("player-canvas"),
    width: 130,
    height: 150,
    skin: "https://textures.minecraft.net/texture/3b60a1f0333387c054236f3323089d7b9da54f3b76251ec652f1950d87fa678"
  });
  viewer.zoom = 0.7;
  
  window.addEventListener("mousemove", (e) => {
    const box = document.getElementById("player-box").getBoundingClientRect();
    const x = (e.clientX - (box.left + box.width / 2)) / window.innerWidth;
    const y = (e.clientY - (box.top + box.height / 2)) / window.innerHeight;
    viewer.playerObject.rotation.y = x * 2.5;
    viewer.playerObject.rotation.x = y * 0.8;
  });
}

function render() {
  const kit = KITS[currentKit];
  document.getElementById("kit-name").innerText = kit.name;
  const container = document.getElementById("inventory-container");
  
  // Slide animation effect
  container.style.opacity = "0.7";
  container.style.transform = "scale(0.98)";

  setTimeout(() => {
    // Armour
    const aSlots = document.getElementById("armour-slots").children;
    kit.armour.forEach((id, i) => {
      aSlots[i].innerHTML = `<img src="${ITEM_URL}${id}" onerror="this.style.display='none'">`;
    });

    // Main Inv (27 slots)
    const mInv = document.getElementById("main-inv");
    mInv.innerHTML = "";
    for(let i=0; i<27; i++) {
      const item = kit.inv[i];
      mInv.innerHTML += `<div class="slot">${item ? `<img src="${ITEM_URL}${item.id}"><span class="count">${item.n}</span>` : ''}</div>`;
    }

    // Hotbar (9 slots)
    const hInv = document.getElementById("hotbar-inv");
    hInv.innerHTML = "";
    for(let i=0; i<9; i++) {
      const item = kit.hotbar[i];
      hInv.innerHTML += `<div class="slot">${item ? `<img src="${ITEM_URL}${item.id}"><span class="count">${item.n}</span>` : ''}</div>`;
    }
    
    container.style.opacity = "1";
    container.style.transform = "scale(1)";
  }, 50);

  document.getElementById("prevBtn").disabled = currentKit === 0;
  document.getElementById("nextBtn").disabled = currentKit === KITS.length - 1;
}

document.getElementById("nextBtn").onclick = () => { if(currentKit < KITS.length-1) { currentKit++; render(); } };
document.getElementById("prevBtn").onclick = () => { if(currentKit > 0) { currentKit--; render(); } };

window.onload = () => {
  initPlayer();
  render();
};
</script>
</body>
</html>
