<style>
@font-face { font-family:'Mineglyph'; src:url('/assets/fonts/mineglyph-faithful.otf') format('opentype'); }
.mc-tooltip,.level-btn,.count,.mc-title { font-family:'Mineglyph','Minecraft',monospace; }

.item-wrapper { width:30px; height:30px; position:relative; }
.item-wrapper img { width:100%; height:100%; image-rendering:pixelated; }
.item-wrapper.enchanted::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(65deg,transparent 20%,rgba(160,65,255,.6) 50%,transparent 80%);
  background-size:200% 200%; mix-blend-mode:screen;
  animation:glint 2.5s infinite linear; z-index:2; pointer-events:none;
}
@keyframes glint { 0%{background-position:200% center} 100%{background-position:-200% center} }

:root {
  --mc-panel:#c6c6c6; --mc-font:'Minecraft','Courier New',monospace;
  --mc-border-light:#fff; --mc-border-dark:#555;
  --mc-slot-bg:#8b8b8b; --mc-slot-dark:#373737;
}
main { display:flex; flex-direction:column; align-items:center; margin-top:40px; width:100%; font-family:var(--mc-font); image-rendering:pixelated; user-select:none; }
.mc-container { background:var(--mc-panel); border:4px solid var(--mc-border-light); border-right-color:var(--mc-border-dark); border-bottom-color:var(--mc-border-dark); padding:12px; box-shadow:inset 2px 2px 0 #000,0 10px 30px rgba(0,0,0,.3); }
.mc-title { color:#373737; font-size:16px; margin-bottom:8px; text-shadow:1px 1px 0 rgba(255,255,255,.5); }

#chest-view { display:flex; flex-direction:column; }
.chest-grid { display:grid; grid-template-columns:repeat(9,36px); grid-template-rows:repeat(5,36px); gap:2px; }

#inventory-view { display:none; flex-direction:column; align-items:center; }
#kit-header { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:15px; }
#kit-name-display { font-size:1.5rem; text-shadow:2px 2px 0 rgba(0,0,0,.5); text-align:center; color:var(--text); }
.level-selector { display:flex; gap:4px; background:rgba(0,0,0,.2); padding:6px; border-radius:4px; border:2px solid var(--border); }
.level-btn { background:#555; color:#aaa; border:2px solid #222; border-top-color:#888; border-left-color:#888; width:32px; height:32px; font-family:var(--mc-font); font-size:16px; cursor:pointer; text-shadow:1px 1px 0 #000; }

.level-btn.active { background:#373737; color:#fff; border-color:#111; border-top-color:#222; border-left-color:#222; }
.level-btn.p2 { background:#b8860b; color:#fff; border-color:#8b6508; border-top-color:#ffd700; border-left-color:#ffd700; width:40px; font-weight:bold; }
.level-btn.p2:hover { background:#daa520; }
.level-btn.p2.active { background:#8b6508; border-color:#553a00; border-top-color:#b8860b; border-left-color:#b8860b; }

.top-section { display:flex; gap:12px; margin-bottom:15px; align-items:flex-start; }
.armour-column { display:flex; flex-direction:column; gap:2px; }
#player-box { width:120px; height:150px; background:#000; border:2px solid var(--mc-slot-dark); border-right-color:var(--mc-border-light); border-bottom-color:var(--mc-border-light); overflow:hidden; }
.crafting-area { display:flex; flex-direction:column; margin-left:15px; margin-top:5px; }
.crafting-layout { display:flex; align-items:center; gap:12px; }

.crafting-arrow { color:#8b8b8b; font-size:28px; text-shadow:2px 2px 0 #fff; margin-top:-4px; }
.inv-grid { display:grid; grid-template-columns:repeat(9,36px); gap:2px; }
.hotbar-spacer { height:8px; }

.slot { width:36px; height:36px; background:var(--mc-slot-bg); border:2px solid var(--mc-slot-dark); border-right-color:var(--mc-border-light); border-bottom-color:var(--mc-border-light); display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; }
.slot.locked { cursor:not-allowed; opacity:.5; }
.slot:hover:not(.locked) { background:#bebebe; outline:2px solid #fff; z-index:10; }
.slot img { width:30px; height:30px; image-rendering:pixelated; pointer-events:none; }
.count { position:absolute; bottom:1px; right:2px; font-size:14px; color:#fff; text-shadow:1px 1px 0 #3f3f3f; pointer-events:none; z-index:2; }

.mc-tooltip { display:none; position:fixed; z-index:9999; pointer-events:none; padding:8px 10px; background:rgba(16,0,16,.95); border:2px solid #2d0064; color:#fff; box-shadow:2px 2px 5px rgba(0,0,0,.5); }

.tt-name { font-size:16px; display:block; }
.tt-div  { height:2px; margin:6px 0; background:#4a0064; }

// ════════════════════════════════════════════════════════════════════════════
// API CONFIG
// ════════════════════════════════════════════════════════════════════════════
const API_BASE = "https://api.minecraftitems.xyz/api/item/";
const API_KEY  = "mcapi_5cb1f0643162ea2f7b0aa174d27061cdfa1f35c318532b602a9bf86045063ff9";
const API_SIZE = 4;
const LEATHER_COLORS = { lime:"1688601", green:"31744", white:"16383998" };

function itemUrl(id, leatherDye=null, enchanted=false) {
  let u = `${API_BASE}${id}?apiKey=${API_KEY}&size=${API_SIZE}`;
  if (leatherDye) u += `&color=${LEATHER_COLORS[leatherDye]}`;
  if (enchanted)  u += `&glint=true`;
  return u;
}

// Block items needing a specific rotation path-segment for correct display
// chest → /right gives a readable isometric front-facing angle
// wither_skeleton_skull → /left gives a frontal face view instead of top-down
function blockUrl(id, rotation='right') {
  return `${API_BASE}${id}/size=${API_SIZE}/${rotation}?apiKey=${API_KEY}`;
}

// ════════════════════════════════════════════════════════════════════════════
// ITEM DSL
// ════════════════════════════════════════════════════════════════════════════

// itm(id, name, rarity='common', stack=null, enchants=[], leatherDye=null)
function itm(id, name, rarity='common', stack=null, enchants=[], leatherDye=null) {
  return { id, name, rarity, stack,
    lines: enchants.map(e=>({text:e,cls:'c-grey'})),
    enchanted: enchants.length > 0,
    customImg: null, leatherDye };
}

// Leather helpers — slot → leather_* id, with optional dye and enchants
const _LIDS = {helmet:'leather_helmet',chestplate:'leather_chestplate',leggings:'leather_leggings',boots:'leather_boots'};
function _lth(slot,name,dye,enc=[]) { return itm(_LIDS[slot],name,'common',null,enc,dye); }
function lth(slot,name,enc=[]) { return _lth(slot,name,'white',enc); }  // plain/undyed
function lim(slot,name,enc=[]) { return _lth(slot,name,'lime', enc); }  // lime dyed
function grn(slot,name,enc=[]) { return _lth(slot,name,'green',enc); }  // green dyed

// Potion helpers
function pot(name,stack=null)  { return itm('potion',       name,'common',stack); }
function spot(name,stack=null) { return itm('splash_potion',name,'common',stack); }

const COMPASS = itm('compass','Compass','common');

// ════════════════════════════════════════════════════════════════════════════
// PATCH ENGINE
// kit(patches) — define each level as ONLY what changes from the level above.
// Slot keys: helmet|chestplate|leggings|boots  for armour
//            h0–h7 for hotbar (h8 = compass, always auto-filled)
//            i0–i26 for inventory
// Set a key to null to remove it from that level onward.
// ════════════════════════════════════════════════════════════════════════════
function kit(patches) {
  const levels = [];
  let state = {};
  for (const patch of patches) {
    // deep-clone then apply patch
    state = JSON.parse(JSON.stringify(state));
    for (const [k,v] of Object.entries(patch)) {
      if (v === null) delete state[k];
      else state[k] = v;
    }
    const armour = {};
    for (const k of ['helmet','chestplate','leggings','boots']) if (state[k]) armour[k]=state[k];
    const hotbar = [];
    for (let i=0;i<8;i++) hotbar.push(state[`h${i}`]||null);
    hotbar.push(COMPASS);
    const inv = [];
    for (let i=0;i<27;i++) inv.push(state[`i${i}`]||null);
    levels.push({armour,hotbar,inv});
  }
  return levels;
}

const RANDOM_IDS = ['saddle','arrow','bow','iron_boots','witch_spawn_egg','cooked_beef','iron_hoe','flint_and_steel','potion','wooden_sword','slime_ball','golden_apple','oak_boat','iron_pickaxe','cake','golden_sword','cooked_porkchop','feather','iron_chestplate','rotten_flesh','short_grass','stone_sword','minecart','fishing_rod','milk_bucket','diamond_boots','spider_spawn_egg','blaze_rod','bone','experience_bottle','snowball','stick','egg','leather_chestplate','tnt'];
let rndIdx=0, rndTimer=null;

let activeKitName=null, currentLevelIndex=9;

function initChest() {
  const grid = document.getElementById('chest-grid');
  let html='';
  for (let i=0;i<45;i++) {
    if (i===44) {
      html+=`<div class="slot locked" id="random-slot" title="Random Kit"><div class="item-wrapper"><img id="random-img" src="${itemUrl(RANDOM_IDS[0])}" alt="?"></div></div>`;
    } else if (!chestMap[i]) {
      html+=`<div class="slot"></div>`;
    } else {
      const k=chestMap[i];
      const img=k.customImg||itemUrl(k.id);
      const td=JSON.stringify({id:k.id,name:k.name,rarity:'epic',stack:null,lines:[{text:'Click to view tiers',cls:'c-yellow'}],enchanted:false,customImg:k.customImg||null,leatherDye:null}).replace(/"/g,'&quot;');
      html+=`<div class="slot" data-item="${td}" onclick="openKit('${k.name}')"><div class="item-wrapper"><img src="${img}" alt="${k.name}" onerror="this.style.display='none'"></div></div>`;
    }
  }
  grid.innerHTML=html;
  startRandom();
}

function startRandom() {
  if (rndTimer) clearInterval(rndTimer);
  rndTimer=setInterval(()=>{
    rndIdx=(rndIdx+1)%RANDOM_IDS.length;
    const img=document.getElementById('random-img');
    if (img) img.src=itemUrl(RANDOM_IDS[rndIdx]);
  },800);
}

function showChestView() {
  document.getElementById('inventory-view').style.display='none';
  document.getElementById('chest-view').style.display='flex';
  activeKitName=null; tooltip.classList.remove('show'); startRandom();
}

function openKit(name) {
  if (!KIT_DATABASE[name]) KIT_DATABASE[name]=blankKitArray();
  activeKitName=name; setLevel(9);
  if (rndTimer){clearInterval(rndTimer);rndTimer=null;}
  document.getElementById('chest-view').style.display='none';
  document.getElementById('inventory-view').style.display='flex';
  setTimeout(initPlayer,50);
}

function setLevel(i) {
  currentLevelIndex=i;
  document.querySelectorAll('.level-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  renderInventory();
}

// Hotbar scoring: weapons first, then ranged, then utility
function sortHotbar(raw) {
  const hasEnch=(it,txt)=>it.lines&&it.lines.some(l=>l.text.toLowerCase().includes(txt));
  const score=it=>{
    const id=it.id.toLowerCase();
    if (id.includes('_sword'))    return 1;
    if (id.includes('_axe'))      return 2;
    if (hasEnch(it,'sharpness'))  return 3;
    if (id.includes('_pickaxe'))  return 4;
    if (id==='stick'||id==='ghast_tear') return 5;
    if (id==='bow')               return 6;
    if (id==='fishing_rod')       return 7;
    return 99;
  };
  const items=raw.filter(i=>i&&i.id&&i.id!=='compass');
  items.sort((a,b)=>score(a)-score(b));
  const out=Array(9).fill(null);
  for(let i=0;i<8&&i<items.length;i++) out[i]=items[i];
  out[8]=COMPASS;
  return out;
}

function renderInventory() {
  const d=KIT_DATABASE[activeKitName][currentLevelIndex];
  document.getElementById('kit-name-display').innerHTML=`<span style="color:var(--accent)">${activeKitName}</span> ${levelNames[currentLevelIndex]}`;
  document.getElementById('armour-slots').innerHTML=['helmet','chestplate','leggings','boots'].map(t=>makeSlotHtml(d.armour[t])).join('');
  let m=''; for(let i=0;i<27;i++) m+=makeSlotHtml(d.inv[i]);
  document.getElementById('main-inv').innerHTML=m;
  const hb=sortHotbar(d.hotbar);
  let h=''; for(let i=0;i<9;i++) h+=makeSlotHtml(hb[i]);
  document.getElementById('hotbar-inv').innerHTML=h;
}

// Block IDs whose API textures don't work well with CSS mask-image clipping
const BLOCK_IDS=new Set(['chest','tnt','cactus','wither_skeleton_skull','short_grass','minecart','chest_minecart','rail','powered_rail','redstone_torch']);

function makeSlotHtml(it) {
  if (!it||(!it.id&&!it.customImg)) return `<div class="slot"></div>`;
  const img=it.customImg||itemUrl(it.id,it.leatherDye,it.enchanted);
  const wrap=it.enchanted?'item-wrapper enchanted':'item-wrapper';
  const isBlock=BLOCK_IDS.has(it.id);
  // Only apply mask on non-block enchanted items (mask clips glint to sprite shape)
  const mask=(!isBlock&&it.enchanted)?`style="-webkit-mask-image:url('${img}');mask-image:url('${img}');mask-size:contain;"`:'' ;
  const ds=JSON.stringify(it).replace(/"/g,'&quot;');
  let html=`<div class="slot" data-item="${ds}"><div class="${wrap}" ${mask}><img src="${img}" alt="${it.name}" onerror="this.style.display='none'"></div>`;
  if (it.stack&&it.stack>1) html+=`<span class="count">${it.stack}</span>`;
  return html+`</div>`;
}

const tooltip=document.getElementById('tooltip');
function buildTooltip(it) {
  let h=`<span class="tt-name r-${it.rarity}">${it.name}</span>`;
  if (it.lines&&it.lines.length){h+='<div class="tt-div"></div>';for(const l of it.lines)h+=`<span class="tt-line ${l.cls||''}">${l.text}</span>`;}
  return h;
}
document.addEventListener('mouseover',e=>{const s=e.target.closest('.slot');if(!s)return;const d=s.getAttribute('data-item');if(!d)return;tooltip.innerHTML=buildTooltip(JSON.parse(d));tooltip.classList.add('show');});
document.addEventListener('mousemove',e=>{if(!tooltip.classList.contains('show'))return;const p=15;let x=e.clientX+p,y=e.clientY+p;if(x+tooltip.offsetWidth>window.innerWidth)x=e.clientX-tooltip.offsetWidth-p;if(y+tooltip.offsetHeight>window.innerHeight)y=e.clientY-tooltip.offsetHeight-p;tooltip.style.left=x+'px';tooltip.style.top=y+'px';});
document.addEventListener('mouseout',e=>{if(e.target.closest('.slot'))tooltip.classList.remove('show');});

let viewer;
function initPlayer() {
  const c=document.getElementById('player-canvas');
  if(viewer){viewer.setSize(120,150);return;}
  try{
    viewer=new skinview3d.SkinViewer({canvas:c,width:120,height:150,skin:'https://crafatar.com/skins/853c80ef3c3749fdaa49938b674adae6'});
    viewer.zoom=0.8;viewer.autoRotate=false;
    document.addEventListener('mousemove',e=>{
      if(document.getElementById('inventory-view').style.display==='none')return;
      if(!viewer?.playerObject)return;
      const b=document.getElementById('player-box').getBoundingClientRect();
      viewer.playerObject.rotation.y=((e.clientX-b.left-b.width/2)/window.innerWidth)*3;
      viewer.playerObject.rotation.x=((e.clientY-b.top-b.height/2)/window.innerHeight)*1.5;
    });
  }catch(e){console.error('3D failed:',e);}
}

window.onload=initChest;
</script>
