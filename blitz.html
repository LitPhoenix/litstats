<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="https://litstats.com/blitz.html">
<meta property="twitter:title" content="LitStats - Blitz Kits">
<meta property="twitter:description" content="Generate a comprehensive cabinet of Hypixel maxed games and missing achievements.">
<meta property="twitter:image" content="https://litstats.com/img/lq-opengraph.png">

<title>LitStats - Blitz Kits</title>
<meta name="theme-color" content="#ff5100">

<link rel="icon" type="image/png" href="img/lq-favicon.png" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="assets/css/mc-gui.css">

<style>
/* Local Blitz structural overrides */
#kit-name-display { font-size: 2rem; font-weight: 500; text-align: center; color: var(--text); font-family: 'DM Sans', sans-serif; margin-bottom: 8px; }
#chest-view { display: flex; flex-direction: column; }
#inventory-view { display: none; flex-direction: column; align-items: center; }
#kit-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }

/* Hardcoded Enchantment Glint */
.item-wrapper.enchanted::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(65deg, transparent 20%, rgba(160,65,255,.7) 50%, transparent 80%);
  background-size: 200% 200%; mix-blend-mode: screen;
  animation: glint 2.5s infinite linear; z-index: 4; pointer-events: none;
  -webkit-mask-image: var(--mask-img); mask-image: var(--mask-img);
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
}
@keyframes glint { 0%{background-position:200% center} 100%{background-position:-200% center} }

.level-selector { display: flex; gap: 6px; background: rgba(128, 128, 128, 0.1); padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
.level-btn {
  background: rgba(128, 128, 128, 0.15); color: var(--text-2); border: 1px solid transparent;
  width: auto; min-width: 36px; height: 36px; padding: 0 8px;
  font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; border-radius: 6px; transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.level-btn:hover { background: rgba(128, 128, 128, 0.3); color: var(--text); }
.level-btn.active { background: var(--accent); color: #fff; box-shadow: 0 0 12px rgba(255, 81, 0, 0.4); }
.level-btn.p2 { color: #ffaa00; border-color: rgba(255, 170, 0, 0.3); }
.level-btn.p2:hover { background: rgba(255, 170, 0, 0.1); }
.level-btn.p2.active { background: linear-gradient(135deg, #ffaa00, #d48800); color: #fff; border-color: transparent; box-shadow: 0 0 12px rgba(255, 170, 0, 0.4); }
.level-btn.p2 .p2-star { height: 10px; width: auto; margin: 0 1px; display: inline-block; vertical-align: middle; }
.kit-title-p2-star { height: 18px; width: auto; vertical-align: middle; margin: 0 1px; }
.tt-p2-star { height: 12px; width: auto; vertical-align: middle; margin: 0 1px; }
.level-btn.level-color-2 { color: #00AA00; }
.level-btn.level-color-a { color: #55FF55; }
.level-btn.level-color-e { color: #FFFF55; }
.level-btn.level-color-c { color: #FF5555; }
.level-btn.level-color-4 { color: #AA0000; }
.level-btn.level-color-6 { color: #FFAA00; }

.top-section { display: flex; gap: 2px; margin-bottom: 8px; align-items: flex-start; }
.armour-column { display: flex; flex-direction: column; gap: var(--grid-gap); }
.hotbar-spacer { height: 12px; }
body.theme-classic .hotbar-spacer { height: 8px; }

#player-box {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 140px; height: 172px; 
  background-color: #2a2a2a;
  border: 2px solid var(--mc-slot-dark); 
  border-right-color: var(--mc-border-light); 
  border-bottom-color: var(--mc-border-light);
  border-radius: 4px; overflow: hidden;
}
body.theme-classic #player-box { border-radius: 0; width: 112px; height: 144px; }

#skin-username {
  position: absolute;
  top: -4px;
  width: 90%;
  background: transparent;
  border: none;
  color: #fff;
  font-family: var(--mc-font), 'DM Mono', monospace;
  font-size: 14px;
  text-align: center;
  outline: none;
  text-shadow: 2px 2px 0 #3f3f3f;
  z-index: 10;
  cursor: text;
}

#skin-username:focus {
  color: #ffaa00; /* MC Gold */
}

#player-canvas {
  display: block;
}

.crafting-area { display: flex; margin-top: 36px; flex-direction: column; margin-left: 36px; }
.crafting-layout { display: flex; align-items: center; gap: 4px; }
.crafting-arrow { color: var(--text-3); font-size: 24px; font-family: 'DM Sans', sans-serif; }
body.theme-classic .crafting-area { margin-left: 16px; margin-top: 22px; }
body.theme-classic .crafting-arrow { font-family: var(--mc-font); font-size: 28px; }

.back-btn {
  background: rgba(128, 128, 128, 0.1); color: var(--text); border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 24px; transition: 0.2s; font-family: 'DM Sans', sans-serif;
}
.back-btn:hover { background: var(--accent); color: #fff; border-color: transparent; }

/* Keep the normal button selector styling even in Classic UI mode. */

body.theme-classic .level-btn.level-color-2 { color: #00AA00; }
body.theme-classic .level-btn.level-color-a { color: #55FF55; }
body.theme-classic .level-btn.level-color-e { color: #FFFF55; }
body.theme-classic .level-btn.level-color-c { color: #FF5555; }
body.theme-classic .level-btn.level-color-4 { color: #AA0000; }
body.theme-classic .level-btn.level-color-6 { color: #FFAA00; }

.blitz-settings {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface); backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 20px; display: flex; gap: 20px; z-index: 1000;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2); font-family: 'DM Sans', sans-serif;
}
@media (max-width: 768px) {
  .blitz-settings { bottom: env(safe-area-inset-bottom, 16px); left: 50%; transform: translateX(-50%); right: auto; width: 90%; max-width: 320px; justify-content: space-between; padding: 12px 16px; }
}
.setting-group { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; color: var(--text-2); }
.switch { position: relative; display: inline-block; width: 36px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(128,128,128,0.2); transition: .3s; border-radius: 20px; border: 1px solid var(--border-strong); }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: var(--text-3); transition: .3s; border-radius: 50%; }
input:checked + .slider { background-color: var(--accent); border-color: var(--accent); }
input:checked + .slider:before { transform: translateX(16px); background-color: #fff; }
</style>
</head>
<body>
<script src="assets/js/components.js"></script>

<main class="mc-scale-engine">
  <div id="chest-view" class="mc-container">
    <div class="mc-title">Kit Selector</div>
    <div class="mc-grid" style="--cols: 9; --rows: 5;" id="chest-grid"></div>
  </div>

  <div id="inventory-view">
    <div id="kit-header">
      <div id="kit-name-display">Loading...</div>
      <div class="level-selector" id="level-buttons">
        <button class="level-btn" onclick="setLevel(0)">1</button>
        <button class="level-btn" onclick="setLevel(1)">2</button>
        <button class="level-btn" onclick="setLevel(2)">3</button>
        <button class="level-btn" onclick="setLevel(3)">4</button>
        <button class="level-btn" onclick="setLevel(4)">5</button>
        <button class="level-btn" onclick="setLevel(5)">6</button>
        <button class="level-btn" onclick="setLevel(6)">7</button>
        <button class="level-btn" onclick="setLevel(7)">8</button>
        <button class="level-btn" onclick="setLevel(8)">9</button>
        <button class="level-btn active" onclick="setLevel(9)">10</button>
        <button class="level-btn p2" onclick="setLevel(10)">P2</button>
      </div>
    </div>
    
    <div id="inventory-container" class="mc-container">
      <div class="top-section">
        <div class="armour-column" id="armour-slots"></div>
        <div id="player-box">
          <input type="text" id="skin-username" value="Username" spellcheck="false">
          <canvas id="player-canvas"></canvas>
        </div>
        <div class="crafting-area">
          <div class="mc-title">Crafting</div>
          <div class="crafting-layout">
            <div class="mc-grid" style="--cols: 2; --rows: 2;">
              <div class="slot"></div><div class="slot"></div>
              <div class="slot"></div><div class="slot"></div>
            </div>
            <div class="crafting-arrow">➔</div>
            <div class="slot"></div>
          </div>
        </div>
      </div>
      <div id="bottom-section">
        <div class="mc-grid" style="--cols: 9; --rows: 3;" id="main-inv"></div>
        <div class="hotbar-spacer"></div>
        <div class="mc-grid" style="--cols: 9; --rows: 1;" id="hotbar-inv"></div>
      </div>
    </div>
    <button class="back-btn" onclick="showChestView()">← Back to Kit Selector</button>
  </div>
</main>

<div class="blitz-settings">
  <div class="setting-group">
    <span>Classic UI</span>
    <label class="switch">
      <input type="checkbox" id="toggleClassic" onchange="toggleClassicMode(this.checked)">
      <span class="slider"></span>
    </label>
  </div>
  <div class="setting-group">
    <span>Roman Numerals</span>
    <label class="switch">
      <input type="checkbox" id="toggleRoman" onchange="toggleRomanNumerals(this.checked)">
      <span class="slider"></span>
    </label>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.js"></script>
<script src="assets/js/global.js"></script>
<script src="assets/js/kits.js"></script>
<script src="assets/js/mc-engine.js"></script>
<script src="assets/js/blitz.js"></script>

</body>
</html>
