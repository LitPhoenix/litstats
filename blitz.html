<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Kit Inventory</title>
<link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --mc-panel: #c6c6c6;
  --mc-font: 'Minecraft', sans-serif;
}

body {
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: var(--mc-font);
  color: #fff;
  image-rendering: pixelated;
  user-select: none;
}

#kit-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 15px;
}

.arrow-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 32px;
  cursor: pointer;
  font-family: var(--mc-font);
}

.arrow-btn:hover:not(:disabled) { color: #fff; }
.arrow-btn:disabled { opacity: 0.2; }

#kit-name {
  font-size: 1.5rem;
  text-shadow: 2px 2px 0 #000;
  min-width: 300px;
  text-align: center;
}

#inventory-container {
  background: var(--mc-panel);
  border: 4px solid #fff;
  border-right-color: #555;
  border-bottom-color: #555;
  padding: 12px;
  box-shadow: inset 2px 2px 0 #000;
  transition: transform 0.1s ease-out, opacity 0.1s ease-out;
}

/* --- Top Section: Armour, Player, Crafting --- */
.top-section {
  display: flex;
  gap: 12px;
  margin-bottom: 15px;
  align-items: flex-start;
}

.armour-column {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

#player-box {
  width: 120px;
  height: 150px;
  background: #000;
  border: 2px solid #373737;
  border-right-color: #fff;
  border-bottom-color: #fff;
  position: relative;
  overflow: hidden;
}

/* Crafting Layout */
.crafting-area {
  display: flex;
  flex-direction: column;
  margin-left: 15px;
  margin-top: 5px;
}

.crafting-title {
  color: #373737;
  font-size: 14px;
  margin-bottom: 5px;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
}

.crafting-layout {
  display: flex;
  align-items: center;
  gap: 12px;
}

.crafting-grid {
  display: grid;
  grid-template-columns: repeat(2, 36px);
  gap: 2px;
}

.crafting-arrow {
  color: #8b8b8b;
  font-size: 28px;
  text-shadow: 2px 2px 0 #fff;
  line-height: 1;
  margin-top: -4px;
}

/* --- Slots --- */
.inv-grid {
  display: grid;
  grid-template-columns: repeat(9, 36px);
  gap: 2px;
}

.slot {
  width: 36px;
  height: 36px;
  background: #8b8b8b;
  border: 2px solid #373737;
  border-right-color: #fff;
  border-bottom-color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.slot:hover {
  background: #bebebe;
  outline: 2px solid #fff;
  z-index: 10;
}

.slot img {
  width: 30px;
  height: 30px;
  image-rendering: pixelated;
  pointer-events: none;
}

.count {
  position: absolute;
  bottom: 1px;
  right: 2px;
  font-size: 14px;
  color: #fff;
  text-shadow: 1px 1px 0 #3f3f3f;
  pointer-events: none;
  z-index: 2;
}

.hotbar-spacer { height: 8px; }

/* --- Tooltips --- */
.mc-tooltip {
  display: none;
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  padding: 8px 10px;
  background: rgba(16, 0, 16, 0.95);
  border: 2px solid #2d0064;
  image-rendering: pixelated;
  color: #fff;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}
.mc-tooltip.show { display: block; }
.tt-name { font-size: 16px; display: block; }
.tt-div { height: 2px; margin: 6px 0; background: #4a0064; }
.tt-line { font-size: 14px; display: block; margin-top: 4px; }

.r-common { color: #fff; }
.r-uncommon { color: #55ff55; }
.r-rare { color: #5555ff; }
.r-epic { color: #ff55ff; }
.r-legendary { color: #ffaa00; }
.c-grey { color: #aaa; }
.c-yellow { color: #ffff55; }
.c-purple { color: #ff55ff; }

</style>
</head>
<body>

<div id="kit-header">
  <button class="arrow-btn" id="prevBtn">◀</button>
  <div id="kit-name">Loading...</div>
  <button class="arrow-btn" id="nextBtn">▶</button>
</div>

<div id="inventory-container">
  <div class="top-section">
    <div class="armour-column" id="armour-slots"></div>

    <div id="player-box">
      <canvas id="player-canvas"></canvas>
    </div>

    <div class="crafting-area">
      <div class="crafting-title">Crafting</div>
      <div class="crafting-layout">
        <div class="crafting-grid">
          <div class="slot"></div><div class="slot"></div>
          <div class="slot"></div><div class="slot"></div>
        </div>
        <div class="crafting-arrow">➔</div>
        <div class="slot"></div>
      </div>
    </div>
  </div>

  <div id="bottom-section">
    <div class="inv-grid" id="main-inv"></div>
    <div class="hotbar-spacer"></div>
    <div class="inv-grid" id="hotbar-inv"></div>
  </div>
</div>

<div class="mc-tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skinview3d@2.2.0/bundles/skinview3d.min.js"></script>

<script>
const ITEM_API = "https://api.minecraftitems.xyz/api/item/";

function item(id, name, rarity = 'common', stack = null, lines = []) {
  return { id, name, rarity, stack, lines };
}

const KITS = [
  {
    name: "Kit I - Starter",
    armour: {
      helmet: item('leather_helmet', 'Leather Helmet', 'common', null, [{text: '+1 Armour', cls: 'c-yellow'}]),
      chestplate: item('leather_chestplate', 'Leather Chestplate', 'common', null, [{text: '+3 Armour', cls: 'c-yellow'}]),
      leggings: item('leather_leggings', 'Leather Leggings', 'common', null, [{text: '+2 Armour', cls: 'c-yellow'}]),
      boots: item('leather_boots', 'Leather Boots', 'common', null, [{text: '+1 Armour', cls: 'c-yellow'}])
    },
    hotbar: [
      item('wooden_sword', 'Wooden Sword', 'common', null, [{text: '+4 Attack Damage', cls: 'c-yellow'}]),
      item('bread', 'Bread', 'common', 16, [{text: 'Restores 5 hunger.', cls: 'c-grey'}])
    ],
    inv: [item('cobblestone', 'Cobblestone', 'common', 64)]
  },
  ...Array(9).fill().map((_, i) => ({
    name: `Kit ${i+2} - Unlocked Soon`,
    armour: {}, hotbar: [], inv: []
  })),
  {
    name: "Kit XI - Prestige II ✦",
    armour: {
      helmet: item('diamond_helmet', 'Diamond Helmet', 'legendary', null, [{text: '+3 Armour', cls: 'c-yellow'}]),
      chestplate: item('diamond_chestplate', 'Diamond Chestplate', 'legendary', null, [{text: '+8 Armour', cls: 'c-yellow'}]),
      leggings: item('diamond_leggings', 'Diamond Leggings', 'legendary', null, [{text: '+6 Armour', cls: 'c-yellow'}]),
      boots: item('diamond_boots', 'Diamond Boots', 'legendary', null, [{text: '+3 Armour', cls: 'c-yellow'}])
    },
    hotbar: [
      item('diamond_sword', 'Diamond Sword', 'legendary', null, [{text: '+7 Attack Damage', cls: 'c-yellow'}]),
      item('enchanted_golden_apple', 'Enchanted Golden Apple', 'epic', 64)
    ],
    inv: [item('nether_star', 'Nether Star', 'legendary', 9), item('beacon', 'Beacon', 'rare', 1)]
  }
];

// --- 3D Player Engine ---
let viewer;
function initPlayer() {
  const canvas = document.getElementById("player-canvas");
  if(viewer) return;
  
  try {
    viewer = new skinview3d.SkinViewer({
      canvas: canvas,
      width: 120,
      height: 150,
      skin: "https://crafatar.com/skins/853c80ef3c3749fdaa49938b674adae6"
    });
    viewer.zoom = 0.8;
    viewer.autoRotate = false;
    
    document.addEventListener("mousemove", (e) => {
      if(!viewer || !viewer.playerObject) return;
      const box = document.getElementById("player-box").getBoundingClientRect();
      const cx = box.left + box.width / 2;
      const cy = box.top + box.height / 2;
      const x = (e.clientX - cx) / window.innerWidth;
      const y = (e.clientY - cy) / window.innerHeight;
      
      viewer.playerObject.rotation.y = x * 3;
      viewer.playerObject.rotation.x = y * 1.5;
    });
  } catch(e) { console.error("3D Load Failed:", e); }
}

// --- Tooltip Event Delegation Engine ---
const tooltip = document.getElementById('tooltip');

function buildTooltip(it) {
  let h = `<span class="tt-name r-${it.rarity}">${it.name}</span>`;
  if (it.lines && it.lines.length) {
    h += '<div class="tt-div"></div>';
    for (const ln of it.lines) {
      h += `<span class="tt-line ${ln.cls || ''}">${ln.text}</span>`;
    }
  }
  return h;
}

document.addEventListener('mouseover', e => {
  const slot = e.target.closest('.slot');
  if(!slot) return;
  const data = slot.getAttribute('data-item');
  if(!data) return;
  
  const it = JSON.parse(data);
  tooltip.innerHTML = buildTooltip(it);
  tooltip.classList.add('show');
});

document.addEventListener('mousemove', e => {
  if(!tooltip.classList.contains('show')) return;
  const pad = 15;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + tooltip.offsetWidth > window.innerWidth) x = e.clientX - tooltip.offsetWidth - pad;
  if (y + tooltip.offsetHeight > window.innerHeight) y = e.clientY - tooltip.offsetHeight - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
});

document.addEventListener('mouseout', e => {
  if(e.target.closest('.slot')) tooltip.classList.remove('show');
});

// --- Slot Generator ---
function makeSlotHtml(it) {
  if (!it) return `<div class="slot"></div>`;
  // Inject item data directly to HTML attribute to avoid listener drops on redraw
  const dataStr = JSON.stringify(it).replace(/"/g, '&quot;');
  let html = `<div class="slot" data-item="${dataStr}">`;
  html += `<img src="${ITEM_API}${it.id}/size=4" alt="${it.name}" onerror="this.style.display='none'">`;
  if (it.stack && it.stack > 1) html += `<span class="count">${it.stack}</span>`;
  html += `</div>`;
  return html;
}

// --- Render Logic ---
let currentKit = 0;

function render() {
  const kit = KITS[currentKit];
  document.getElementById("kit-name").innerText = kit.name;
  const container = document.getElementById("inventory-container");
  
  container.style.opacity = "0.7";
  container.style.transform = "scale(0.98)";

  setTimeout(() => {
    document.getElementById('armour-slots').innerHTML = ['helmet', 'chestplate', 'leggings', 'boots']
      .map(type => makeSlotHtml(kit.armour[type])).join('');

    let mHtml = "";
    for(let i=0; i<27; i++) mHtml += makeSlotHtml(kit.inv[i]);
    document.getElementById("main-inv").innerHTML = mHtml;

    let hHtml = "";
    for(let i=0; i<9; i++) hHtml += makeSlotHtml(kit.hotbar[i]);
    document.getElementById("hotbar-inv").innerHTML = hHtml;
    
    container.style.opacity = "1";
    container.style.transform = "scale(1)";
  }, 50);

  document.getElementById("prevBtn").disabled = currentKit === 0;
  document.getElementById("nextBtn").disabled = currentKit === KITS.length - 1;
}

document.getElementById("nextBtn").onclick = () => { if(currentKit < KITS.length-1) { currentKit++; render(); } };
document.getElementById("prevBtn").onclick = () => { if(currentKit > 0) { currentKit--; render(); } };

window.onload = () => {
  initPlayer();
  render();
};
</script>
</body>
</html>
