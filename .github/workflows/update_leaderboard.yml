name: Daily Leaderboards Update

on:
  schedule:
    - cron: '0 0 * * *' # every midnight UTC
  workflow_dispatch:

jobs:
  update-leaderboards:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install node-fetch@2 --no-save

      - name: Run Update Scripts
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          node scripts/update_leaderboard.js
          node scripts/update_quests.js

      - name: Commit & Push JSON to main
        run: |
          git config --global user.name "LeaderboardBot"
          git config --global user.email "bot@noreply.github.com"
          git add ap_hunters_data.json questers_data.json
          git commit -m "Daily Leaderboards Update" || exit 0
          git push origin main
