<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitStats - Player Portfolio</title>
  <link rel="icon" type="image/png" href="img/favicon.png" sizes="32x32">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assets/css/global.css">
  
  <style>
    .portfolio-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 65vh; text-align: center; }
    .portfolio-center h1 { font-size: 42px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .portfolio-center p { color: var(--text-2); margin-bottom: 40px; max-width: 480px; line-height: 1.5; }
    
    .search-wrap { display: flex; gap: 8px; width: 100%; max-width: 500px; position: relative; }
    .search-input { 
      flex: 1; padding: 14px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-strong); 
      border-radius: 12px; color: var(--text); font-size: 15px; font-family: inherit;
      backdrop-filter: blur(12px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transition: 0.3s; 
    }
    body:not([data-theme="dark"]) .search-input { background: rgba(255,255,255,0.6); }
    .search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); outline: none; box-shadow: 0 0 0 4px var(--accent-soft), inset 0 2px 4px rgba(0,0,0,0.2); }
    
    .search-btn { 
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border: none; 
      padding: 0 28px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s; 
      box-shadow: 0 4px 12px rgba(255, 81, 0, 0.2); font-family: inherit;
    }
    .search-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255, 81, 0, 0.4); filter: brightness(1.1); }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">
        <img src="img/favicon.png" alt="LitStats" style="width: 32px; height: 32px; border-radius: 8px;">
        <div><div class="logo-text">LitStats</div></div>
      </a>
      <nav class="nav-links desktop-nav">
        <a href="index.html" class="nav-btn">AP Leaderboard</a>
        <a href="quest.html" class="nav-btn">Quest Leaderboard</a>
        <a href="portfolio.html" class="nav-btn active">Portfolio</a>
      </nav>
      <div class="header-controls">
        <button class="mobile-menu-btn" onclick="document.getElementById('mobileNav').classList.toggle('open')">☰</button>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</button>
      </div>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="index.html" class="nav-btn">AP Leaderboard</a>
    <a href="quest.html" class="nav-btn">Quest Leaderboard</a>
    <a href="portfolio.html" class="nav-btn active">Portfolio</a>
  </nav>

  <main>
    <div class="portfolio-center">
      <h1>Lookup Player Portfolio</h1>
      <p>Enter a Hypixel username or UUID to instantly generate a comprehensive cabinet of their maxed games and missing achievements.</p>
      
      <div class="search-wrap">
        <input type="text" id="portSearch" class="search-input" placeholder="e.g. litphoenix" onkeydown="if(event.key==='Enter') goToCabinet()">
        <button class="search-btn" onclick="goToCabinet()">Search</button>
      </div>
      <div id="portError" style="color: var(--red); margin-top: 16px; font-size: 14px; font-weight: 600; display:none;"></div>
    </div>
  </main>

  <div class="bottom-fade"></div>
  <div class="made-by-tag">made by <a href="https://namemc.com/profile/litphoenix.1" target="_blank" id="credits-hover">litphoenix</a></div>

  <script src="assets/js/global.js"></script>
  <script src="assets/js/credits.js"></script>
  <script src="assets/js/credits.js"></script>
  <script>
    async function goToCabinet() {
      const val = document.getElementById('portSearch').value.trim();
      const err = document.getElementById('portError');
      if (!val) { err.textContent = "Please enter a username."; err.style.display = "block"; return; }
      
      err.style.display = "none";
      const searchBtn = document.querySelector('.search-btn');
      searchBtn.textContent = "Loading...";

      try {
        const dbRes = await fetch(`https://playerdb.co/api/player/minecraft/${val}`);
        const dbData = await dbRes.json();
        
        if (dbData.code === 'player.found') {
          window.location.href = `cabinet.html?uuid=${dbData.data.player.raw_id}`;
        } else {
          throw new Error();
        }
      } catch (e) {
        err.textContent = "Minecraft player not found.";
        err.style.display = "block";
        searchBtn.textContent = "Search";
      }
    }
  </script>
</body>
</html>
