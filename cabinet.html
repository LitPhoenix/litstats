<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitStats - Control Centre</title>
  <link rel="icon" type="image/png" href="img/favicon.png" sizes="32x32">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="global.css">

  <style>
    main { max-width: 1400px; margin: 0 auto; padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 24px; width: 100%; }

    /* HEADER NAVIGATION */
    .nav-links { display: flex; gap: 8px; margin-right: auto; margin-left: 32px; }
    .nav-btn { color: var(--text-2); text-decoration: none; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: 0.2s; }
    .nav-btn:hover { background: var(--surface-2); color: var(--text); }
    .nav-btn.active { background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(255, 81, 0, 0.2); }

    /* GLASSMORPHISM PANELS */
    .panel {
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .panel h2 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--text); }

    .actions-panel { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .btn {
      background: var(--surface-2); border: 1px solid var(--border-strong); color: var(--text);
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: var(--border); border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent-2); }
    .btn-primary:hover { background: var(--accent-2); color: #fff; box-shadow: 0 4px 12px var(--accent-soft); }

    .textarea-wrap textarea {
      width: 100%; height: 120px; background: var(--input-bg); border: 1px solid var(--border-strong);
      border-radius: 8px; padding: 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; resize: vertical; margin-bottom: 12px;
    }
    .textarea-wrap textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    /* TABLE */
    .table-toolbar { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .search-bar {
      flex: 1; max-width: 300px; padding: 8px 16px; border: 1px solid var(--border-strong);
      border-radius: 8px; background: var(--input-bg); color: var(--text); font-family: inherit; font-size: 13px;
    }
    .search-bar:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    .table-container { border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; max-height: 600px; overflow-y: auto; background: var(--surface-2); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { position: sticky; top: 0; background: var(--surface); padding: 12px; font-size: 11px; text-transform: uppercase; color: var(--text-3); border-bottom: 2px solid var(--border-strong); z-index: 10; backdrop-filter: blur(12px); }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
    tr:hover { background: var(--surface); }

    .edit-input {
      width: 100%; padding: 6px 8px; background: transparent; border: 1px solid transparent;
      border-radius: 4px; color: var(--text); font-family: inherit; font-size: 13px; transition: all 0.2s;
    }
    .edit-input:hover, .edit-input:focus { background: var(--input-bg); border-color: var(--accent); outline: none; }
    .mono { font-family: 'DM Mono', monospace; font-size: 12px; }

    .flag-wrap { display: flex; align-items: center; gap: 8px; }
    .flag-img { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border-strong); }

    .gain-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
    .gain-pos { color: var(--green); background: var(--green-soft); }
    .gain-neg { color: var(--red); background: var(--red-soft); }
    .gain-zero { color: var(--text-3); }

    .btn-icon { background: transparent; border: none; color: var(--text-3); cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; font-size: 14px; }
    .btn-icon:hover { background: var(--red-soft); color: var(--red); }
  </style>
</head>
<body>

  <header>
    <div class="header-inner" style="width: 100%; display: flex; align-items: center;">
      <a class="logo" href="index.html">
        <img src="img/favicon.png" alt="LitStats" style="width: 32px; height: 32px; border-radius: 8px;">
        <div>
          <div class="logo-text">LitStats</div>
        </div>
      </a>
      
      <nav class="nav-links desktop-nav">
        <a href="index.html" class="nav-btn">AP Leaderboard</a>
        <a href="quest.html" class="nav-btn">Quest Leaderboard</a>
        <a href="#" class="nav-btn active">Control Centre</a>
      </nav>

      <div class="header-controls">
        <button class="theme-toggle" id="themeBtn" aria-label="Toggle Theme" onclick="toggleTheme()">☀️</button>
      </div>
    </div>
  </header>

  <main>
    <div class="panel actions-panel">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📂 Load JSON File</button>
        <input type="file" id="fileInput" accept=".json" style="display: none;" on
