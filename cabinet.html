<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitStats - Player Hub</title>
  
  <link rel="icon" type="image/png" href="img/lq-favicon.png" sizes="32x32">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/cabinet.css">
  <link rel="preload" as="image" href="img/lq-bg-embers.jpg" media="(prefers-color-scheme: dark)">
  <link rel="preload" as="image" href="img/lq-bg-embers-light.jpg" media="(prefers-color-scheme: light)">
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">
        <img src="img/lq-favicon.png" alt="LitStats" style="width: 32px; height: 32px; border-radius: 8px;">
        <div><div class="logo-text">LitStats</div></div>
      </a>
      
      <nav class="nav-links desktop-nav">
        <a href="index.html" class="nav-btn">AP Leaderboard</a>
        <a href="quest.html" class="nav-btn">Quest Leaderboard</a>
        <a href="portfolio.html" class="nav-btn">Portfolio</a>
      </nav>

      <div class="header-controls">
        <button class="theme-toggle" id="themeBtn" aria-label="Toggle Theme" onclick="toggleTheme()">☀️</button>
      </div>
    </div>
  </header>

  <main>
    <div id="loader" class="loading-msg">Summoning network data...</div>
    <div id="errorBox" class="loading-msg hidden" style="color: var(--red);"></div>

    <div id="cabinet-content" class="hidden" style="width: 100%;">
      
      <div class="profile-card">
        <div class="profile-top">
          <img id="p-avatar" class="player-avatar" src="" alt="Avatar">
          <div class="player-info">
            <div class="player-name-row">
              <span class="mc-rank" id="p-rank" style="display:none;"></span>
              <h1 id="p-name">Loading...</h1>
            </div>
            <div class="stat-row">
              <div class="stat-pill"><span>🏆</span> <b id="p-ap">0 AP</b></div>
              <div class="stat-pill"><span>🔥</span> <b id="p-max-count">0 / 26 Maxed</b></div>
            </div>
          </div>
        </div>
        
        <div class="ap-progress-container">
          <div class="ap-labels">
            <span>Progress to Maximum AP</span>
            <span id="p-ap-percent">0%</span>
          </div>
          <div class="ap-bar-bg">
            <div class="ap-bar-fill" id="p-ap-bar" style="width: 0%;"></div>
          </div>
        </div>
      </div>

      <div class="cabinet-wrapper" id="cabinet-grid"></div>

      <div class="todo-section">
        <div class="todo-header">
          <h2>Target Priorities</h2>
          <div class="todo-controls">
            <select id="sortFilter" class="todo-select" onchange="renderTodoGrid()">
              <option value="easiest">Sort: Easiest First</option>
              <option value="hardest">Sort: Hardest First</option>
            </select>
            <select id="gameFilter" class="todo-select" onchange="renderTodoGrid()">
              <option value="all">Games: All</option>
              <option value="no_comp">Games: Exclude Comp (Pit, UHC, MW)</option>
            </select>
          </div>
        </div>

        <div class="ach-grid" id="todo-grid"></div>
      </div>

    </div>
  </main>

  <div class="bottom-fade"></div>
  <div class="made-by-tag">made by <a href="https://namemc.com/profile/litphoenix.1" target="_blank" id="credits-hover">litphoenix</a></div>

  <script src="assets/js/global.js"></script>
  <script src="assets/js/credits.js"></script>
  <script src="assets/js/cabinet.js"></script>
</body>
</html>
