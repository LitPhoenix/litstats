<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Kit Inventory</title>
<style>
@font-face {
  font-family: 'Minecraft';
  src: url('https://cdn.jsdelivr.net/npm/minecraft-font@1.0.0/Minecraft.ttf') format('truetype');
}

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --mc-panel: #c6c6c6;
  --mc-dark:  #373737;
  --mc-slot:  #8b8b8b;
  --mc-font:  'Minecraft', 'VT323', monospace;
}

html, body {
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: var(--mc-font);
  image-rendering: pixelated;
  user-select: none;
  overflow-x: hidden;
}

/* ── Kit title bar ── */
#kit-header {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 14px;
}

.arrow-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 28px;
  cursor: pointer;
  font-family: var(--mc-font);
  line-height: 1;
  padding: 0 6px;
  transition: color 0.1s, transform 0.1s;
}
.arrow-btn:hover { color: #fff; transform: scale(1.2); }
.arrow-btn:disabled { color: #444; cursor: default; transform: none; }

#kit-name {
  font-family: var(--mc-font);
  font-size: 1.35rem;
  color: #fff;
  text-shadow: 2px 2px 0 #000;
  min-width: 280px;
  text-align: center;
  letter-spacing: 1px;
}

#kit-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 10px;
}

.kit-dot {
  width: 8px; height: 8px;
  background: #444;
  border-radius: 50%;
  transition: background 0.2s;
}
.kit-dot.active { background: #fff; }

/* ── Main layout wrapper ── */
#layout {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── Top section: armour + player + off-hand ── */
#top-section {
  display: flex;
  align-items: flex-start;
  gap: 0;
  background: #c6c6c6;
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  padding: 10px;
  padding-bottom: 0;
  position: relative;
}

#top-section::before {
  content: '';
  position: absolute;
  inset: 1px;
  border: 1px solid #000;
  pointer-events: none;
  z-index: 1;
}

/* Armour column */
#armour-col {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-right: 8px;
  padding-top: 4px;
}

.armour-label {
  font-family: var(--mc-font);
  font-size: 0.65rem;
  color: #404040;
  text-align: center;
  margin-bottom: 4px;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
}

/* Player area */
#player-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  padding: 0 8px;
}

#player-canvas-wrap {
  width: 120px;
  height: 200px;
  cursor: grab;
  position: relative;
}

#player-canvas-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

.player-area-label {
  font-family: var(--mc-font);
  font-size: 0.65rem;
  color: #404040;
  margin-top: 2px;
  text-align: center;
}

/* Offhand column */
#offhand-col {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-left: 8px;
  padding-top: 4px;
  align-items: center;
  justify-content: flex-start;
}

/* ── Bottom: main inventory + hotbar ── */
#bottom-section {
  background: #c6c6c6;
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  border-top: none;
  padding: 8px 10px 10px;
  position: relative;
}

#bottom-section::before {
  content: '';
  position: absolute;
  inset: 1px;
  border: 1px solid #000;
  border-top: none;
  pointer-events: none;
}

.section-label {
  font-family: var(--mc-font);
  font-size: 0.72rem;
  color: #404040;
  margin-bottom: 4px;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
}

.inv-grid {
  display: grid;
  grid-template-columns: repeat(9, 36px);
  gap: 2px;
}

.hotbar-sep {
  height: 4px;
  margin: 5px 0 4px;
  background: #8b8b8b;
  border-top: 2px solid #555;
  border-bottom: 2px solid #fff;
}

/* ── Slot ── */
.slot {
  width: 36px; height: 36px;
  background: #8b8b8b;
  border: 2px solid;
  border-color: #555 #fff #fff #555;
  position: relative;
  cursor: default;
  display: flex;
  align-items: center;
  justify-content: center;
  image-rendering: pixelated;
  flex-shrink: 0;
  overflow: hidden;
}

.slot::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid rgba(0,0,0,0.25);
  pointer-events: none;
}

.slot:hover { filter: brightness(1.4); }
.slot.empty-slot { cursor: default; }

.slot img {
  width: 28px; height: 28px;
  image-rendering: pixelated;
  pointer-events: none;
  display: block;
}

.slot .count {
  position: absolute;
  bottom: 1px; right: 2px;
  font-family: var(--mc-font);
  font-size: 12px;
  color: #fff;
  text-shadow: 1px 1px 0 #3f3f3f, -1px 0 0 #3f3f3f, 0 -1px 0 #3f3f3f, -1px -1px 0 #3f3f3f;
  line-height: 1;
  pointer-events: none;
}

/* Armour slot icons (placeholder bg) */
.slot.armour-slot {
  width: 36px; height: 36px;
}

/* ── Tooltip ── */
.mc-tooltip {
  display: none;
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  padding: 7px 9px;
  min-width: 110px;
  max-width: 270px;
  background: #100010;
  border: 1px solid #2d0064;
  box-shadow:
    inset  1px  0   0 #5a00a8,
    inset -1px  0   0 #5a00a8,
    inset  0    1px 0 #5a00a8,
    inset  0   -1px 0 #5a00a8,
    inset  2px  0   0 #14003c,
    inset -2px  0   0 #14003c,
    inset  0    2px 0 #14003c,
    inset  0   -2px 0 #14003c;
  image-rendering: pixelated;
}
.mc-tooltip.show { display: block; }

.tt-name  { font-family: var(--mc-font); font-size: 17px; line-height: 1.25; display: block; }
.tt-div   { height: 5px; margin: 3px 0 4px; background: linear-gradient(to right,#170017,#4a0064,#4a0064,#170017); border-top: 1px solid #0d000d; }
.tt-line  { font-family: var(--mc-font); font-size: 14px; line-height: 1.3; display: block; }

/* colours */
.r-common    { color: #ffffff; }
.r-uncommon  { color: #55ff55; }
.r-rare      { color: #5555ff; }
.r-epic      { color: #ff55ff; }
.r-legendary { color: #ffaa00; }
.r-cursed    { color: #ff5555; }

.c-grey   { color: #aaaaaa; }
.c-dark   { color: #555555; }
.c-yellow { color: #ffff55; }
.c-green  { color: #55ff55; }
.c-red    { color: #ff5555; }
.c-aqua   { color: #55ffff; }
.c-gold   { color: #ffaa00; }
.c-white  { color: #ffffff; }
.c-purple { color: #ff55ff; }

.tt-italic { font-style: italic; }
.tt-bold   { font-weight: bold; }

/* hint */
#hint {
  color: #555;
  font-family: var(--mc-font);
  font-size: 0.8rem;
  margin-top: 12px;
  letter-spacing: 1px;
  text-align: center;
}

/* Durability bar */
.dur-bar-wrap {
  position: absolute;
  bottom: 2px; left: 2px; right: 2px;
  height: 2px;
  background: #000;
}
.dur-bar {
  height: 100%;
}
</style>
</head>

    <!-- Player 3D -->

      </div>

    <div id="offhand-col">
      <div class="armour-label">Off-hand</div>

    </div>
  </div>

  <!-- Bottom: inventory + hotbar -->
  <div id="bottom-section">
    <div class="section-label">Inventory</div>
    <div class="inv-grid" id="main-grid"></div>
    <div class="hotbar-sep"></div>
    <div class="inv-grid" id="hotbar-grid"></div>

<div class="mc-tooltip" id="tooltip"></div>

  return `https://mc-heads.net/item/${id}`;

// ─────────────────────────────────────────────────────────────────────────────
// 3D PLAYER (skinview3d)
// ─────────────────────────────────────────────────────────────────────────────
let viewer;
const SKIN_URL = 'https://assets.mojang.com/SkinTemplates/steve.png';

function initPlayer() {
  const canvas = document.getElementById('player-canvas');
  if (!window.skinview3d) return;

  try {
    viewer = new skinview3d.SkinViewer({
      canvas: canvas,
      width: 120,
      height: 200,
      skin: SKIN_URL,
    });
    viewer.controls.enableRotate = true;
    viewer.controls.enableZoom   = false;
    viewer.controls.enablePan    = false;
    viewer.autoRotate = false;
    viewer.renderer.setClearColor(0x000000, 0);

    // Mouse-tracking rotation
    document.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const cx   = rect.left + rect.width  / 2;
      const cy   = rect.top  + rect.height / 2;
      const dx   = (e.clientX - cx) / window.innerWidth;
      const dy   = (e.clientY - cy) / window.innerHeight;
      viewer.playerObject.rotation.y = dx * Math.PI * 0.8;
      viewer.playerObject.rotation.x = dy * 0.3;
    });

    viewer.render();
  } catch(e) {
    console.warn('skinview3d init failed:', e);
    // Fallback CSS player
    renderFallbackPlayer();
  }
}

function renderFallbackPlayer() {
  const wrap = document.getElementById('player-canvas-wrap');
  wrap.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mc-font);color:#aaa;font-size:0.7rem;text-align:center">3D viewer<br>unavailable</div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function buildTooltip(it) {
  let h = `<span class="tt-name r-${it.rarity||'common'}">${it.name}</span>`;
  if (it.lines && it.lines.length) {
    h += '<div class="tt-div"></div>';
    for (const ln of it.lines) {
      if (!ln.text && ln.text !== 0) { h += '<span class="tt-line" style="font-size:5px">&nbsp;</span>'; continue; }
      const parts = String(ln.text).split('\n');
      for (const p of parts) {
        // split multiple classes
        const cls = ['tt-line', ...(ln.cls ? ln.cls.split(' ') : [])].join(' ');
        h += `<span class="${cls}">${p}</span>`;
      }
    }
  }
  return h;
}

function showTip(it, e) { tooltip.innerHTML = buildTooltip(it); tooltip.classList.add('show'); moveTip(e); }
function moveTip(e) {
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight, pad = 14;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + tw > innerWidth  - 8) x = e.clientX - tw - pad;
  if (y + th > innerHeight - 8) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTip() { tooltip.classList.remove('show'); }

// ─────────────────────────────────────────────────────────────────────────────
// SLOT FACTORY
// ─────────────────────────────────────────────────────────────────────────────
function makeSlot(it, extra='') {
  const el = document.createElement('div');
  el.className = 'slot' + (it ? '' : ' empty-slot') + (extra ? ' '+extra : '');
  if (it) {
    const im = document.createElement('img');
    im.src = img(it.id);
    im.alt = it.name;
    im.onerror = () => { im.src = ''; im.style.display='none'; };
    el.appendChild(im);
    if (it.stack && it.stack > 1) {
      const c = document.createElement('span');
      c.className = 'count';
      c.textContent = it.stack;
      el.appendChild(c);
    }
    el.addEventListener('mouseenter', e => showTip(it, e));
    el.addEventListener('mousemove',  e => moveTip(e));
    el.addEventListener('mouseleave', hideTip);
  }
  return el;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER KIT
// ─────────────────────────────────────────────────────────────────────────────
let currentKit = 0;

const slotIds = ['slot-helmet','slot-chest','slot-legs','slot-boots','slot-offhand'];
const armourKeys = ['helmet','chest','legs','boots','offhand'];

function renderKit(idx) {
  const kit = KITS[idx];
  document.getElementById('kit-name').textContent = kit.name;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === KITS.length - 1;

  // Dots
  document.querySelectorAll('.kit-dot').forEach((d,i) => d.classList.toggle('active', i===idx));

  // Armour slots
  armourKeys.forEach(k => {
    const el = document.getElementById('slot-' + (k==='offhand'?'offhand':k));
    el.innerHTML = '';
    el.className = 'slot armour-slot';
    const it = kit.armour[k];
    if (it) {
      const im = document.createElement('img');
      im.src = img(it.id);
      im.alt = it.name;
      im.onerror = () => { im.style.display='none'; };
      el.appendChild(im);
      el.classList.remove('empty-slot');
      el.addEventListener('mouseenter', e => showTip(it, e));
      el.addEventListener('mousemove',  e => moveTip(e));
      el.addEventListener('mouseleave', hideTip);
    }
  });

  // Main inv
  const mg = document.getElementById('main-grid');
  mg.innerHTML = '';
  for (let i = 0; i < 27; i++) mg.appendChild(makeSlot(kit.inv[i]||null));

  // Hotbar
  const hg = document.getElementById('hotbar-grid');
  hg.innerHTML = '';
  for (let i = 0; i < 9; i++) hg.appendChild(makeSlot(kit.hotbar[i]||null));
}

// Build dots
const dotsEl = document.getElementById('kit-dots');
KITS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'kit-dot';
  dotsEl.appendChild(d);
});

// Arrow buttons
document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentKit > 0) { currentKit--; renderKit(currentKit); }
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentKit < KITS.length-1) { currentKit++; renderKit(currentKit); }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && currentKit > 0)             { currentKit--; renderKit(currentKit); }
  if (e.key === 'ArrowRight' && currentKit < KITS.length-1) { currentKit++; renderKit(currentKit); }
});

// Init
renderKit(0);

// Load skinview3d after DOM ready
window.addEventListener('load', initPlayer);
