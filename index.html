<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-latest.min.js"></script>
    <style>
        body {
            background-color: #2f252f;
            font-family: Crimson Pro, serif;
            font-size: 24px;
            color: #EEE;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #363036;
            border-radius: 10px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-top: 0;
        }
        p {
            margin: 0;
        }
        #kills {
            font-weight: bold;
            color: #FF6666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Warlords Kills</h1>
        <p><span id="kills">...</span> kills</p>
    </div>

    <script>
        var kdr = 0; 
        $.getJSON(
            "https://api.hypixel.net/player?key=15e6de99-939e-41df-8bbc-1dfd0d308f3a&uuid=ddc92083-ea13-4a11-a5dd-d2a7edcde137",
            function (data) {
                kills = data.player.stats.Battleground.kills;
                document.getElementById('kills').innerText = kills;
            }
        );
    </script>
</body>
</html>
