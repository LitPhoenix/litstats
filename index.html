<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="keywords" content="LitStats, Hypixel, Stats, LitPhoenix">

    <title>LitStats</title>
    <link rel="icon" type="image/png" href="litstats logo.png">
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            font-size: 24px;
            color: #EEE;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #333333, #191919);

        }

<body>
    <div class="center-container">
        <div>
            <div class="logo-container">
                <a href="dashboard.html">
                    <img src="litstats.png" alt="LitStats Logo">

            </div>
            <div class="image-container">
                <a href="dashboard.html">
                    <img src="phoenix final - Copy (darkness).png" alt="Phoenix Image">
                </a>
            </div>
        </div>
    </div>
